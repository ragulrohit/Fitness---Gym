<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 - Page Not Found | FitBody</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%F0%9F%92%AA%3C/text%3E%3C/svg%3E">
  <style>
    .error-page {
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 92px 20px 24px;
      text-align: center;
      position: relative;
      overflow: hidden;
      background:
        linear-gradient(rgba(10, 10, 10, 0.86), rgba(10, 10, 10, 0.92)),
        url('images/photo-1534438327276-14e5300c3a48-w1920.webp') center/cover;
    }

    body {
      overflow: hidden;
    }

    .error-page::before,
    .error-page::after {
      content: '';
      position: absolute;
      width: 520px;
      height: 520px;
      border-radius: 50%;
      background: var(--gradient);
      opacity: 0.12;
      filter: blur(40px);
      animation: floatGlow 8s ease-in-out infinite;
    }

    .error-page::before {
      top: -210px;
      right: -160px;
    }

    .error-page::after {
      width: 380px;
      height: 380px;
      bottom: -150px;
      left: -130px;
      animation-delay: -3s;
    }

    .error-content {
      position: relative;
      z-index: 2;
      width: min(760px, 100%);
      padding: 36px;
      border-radius: 24px;
      background: rgba(17, 17, 17, 0.78);
      border: 1px solid rgba(255, 255, 255, 0.08);
      box-shadow: 0 28px 80px rgba(0, 0, 0, 0.48);
      backdrop-filter: blur(12px);
      animation: cardIn 0.8s ease both;
    }

    .error-kicker {
      color: var(--primary);
      font-size: 13px;
      font-weight: 900;
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 10px;
    }

    .error-code {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 10px;
      font-size: clamp(6rem, 17vw, 13rem);
      font-weight: 900;
      line-height: 0.9;
      margin-bottom: 20px;
      letter-spacing: -8px;
    }

    .error-code span {
      display: inline-block;
      background: var(--gradient);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: numberBounce 2.8s ease-in-out infinite;
    }

    .error-code span:nth-child(2) {
      animation-delay: 0.18s;
    }

    .error-code span:nth-child(3) {
      animation-delay: 0.36s;
    }

    .barbell-loader {
      width: 260px;
      height: 64px;
      margin: 0 auto 28px;
      position: relative;
      animation: liftBar 2.2s ease-in-out infinite;
    }

    .barbell-loader::before {
      content: '';
      position: absolute;
      left: 42px;
      right: 42px;
      top: 29px;
      height: 6px;
      border-radius: 99px;
      background: var(--light);
      box-shadow: 0 0 24px rgba(255, 75, 43, 0.28);
    }

    .plate {
      position: absolute;
      top: 8px;
      width: 22px;
      height: 48px;
      border-radius: 8px;
      background: var(--gradient);
      box-shadow: 0 8px 26px rgba(255, 75, 43, 0.3);
    }

    .plate.left-1 { left: 10px; }
    .plate.left-2 { left: 36px; height: 58px; top: 3px; }
    .plate.right-1 { right: 10px; }
    .plate.right-2 { right: 36px; height: 58px; top: 3px; }

    .error-content h1 {
      font-size: clamp(1.7rem, 4vw, 2.7rem);
      font-weight: 900;
      text-transform: uppercase;
      margin-bottom: 14px;
    }

    .error-content p {
      color: var(--gray);
      font-size: 18px;
      max-width: 560px;
      margin: 0 auto 30px;
    }

    .error-actions {
      display: flex;
      gap: 16px;
      justify-content: center;
      flex-wrap: wrap;
      margin-bottom: 30px;
    }

    .error-search {
      display: flex;
      max-width: 460px;
      margin: 0 auto 28px;
      border-radius: 50px;
      overflow: hidden;
      border: 1px solid rgba(255, 255, 255, 0.12);
      background: rgba(255, 255, 255, 0.06);
    }

    .error-search input {
      flex: 1;
      min-width: 0;
      padding: 15px 20px;
      border: none;
      background: transparent;
      color: var(--light);
      font-size: 16px;
      outline: none;
    }

    .error-search button {
      padding: 15px 24px;
      border: none;
      background: var(--gradient);
      color: var(--light);
      font-weight: 800;
      cursor: pointer;
      transition: var(--transition);
    }

    .error-search button:hover {
      filter: brightness(1.1);
    }

    .error-links {
      display: flex;
      justify-content: center;
      gap: 24px;
      flex-wrap: wrap;
    }

    .error-links a {
      color: var(--gray);
      font-weight: 700;
      transition: var(--transition);
    }

    .error-links a:hover {
      color: var(--primary);
      transform: translateY(-2px);
    }

    .floating-plate {
      position: absolute;
      z-index: 1;
      width: 56px;
      height: 56px;
      border-radius: 50%;
      border: 12px solid rgba(255, 75, 43, 0.35);
      opacity: 0.55;
      animation: driftPlate 9s ease-in-out infinite;
    }

    .floating-plate.one {
      top: 18%;
      left: 12%;
    }

    .floating-plate.two {
      right: 13%;
      bottom: 18%;
      width: 42px;
      height: 42px;
      border-width: 9px;
      animation-delay: -4s;
    }

    @keyframes floatGlow {
      0%, 100% { transform: translate3d(0, 0, 0) scale(1); }
      50% { transform: translate3d(24px, -18px, 0) scale(1.08); }
    }

    @keyframes cardIn {
      from { opacity: 0; transform: translateY(28px) scale(0.98); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    @keyframes numberBounce {
      0%, 100% { transform: translateY(0); }
      45% { transform: translateY(-14px); }
      70% { transform: translateY(4px); }
    }

    @keyframes liftBar {
      0%, 100% { transform: translateY(0) rotate(0deg); }
      45% { transform: translateY(-10px) rotate(-1deg); }
      70% { transform: translateY(3px) rotate(1deg); }
    }

    @keyframes driftPlate {
      0%, 100% { transform: translateY(0) rotate(0deg); }
      50% { transform: translateY(-28px) rotate(22deg); }
    }

    @media (max-width: 640px) {
      .error-page {
        padding-top: 82px;
      }

      .error-content {
        padding: 28px 20px;
      }

      .barbell-loader {
        width: 220px;
      }

      .error-search {
        flex-direction: column;
        border-radius: 18px;
      }

      .error-search button {
        border-radius: 0;
      }
    }
  </style>
</head>
<body>
  
  <section class="error-page">
    <span class="floating-plate one" aria-hidden="true"></span>
    <span class="floating-plate two" aria-hidden="true"></span>

    <div class="error-content">
      <div class="error-kicker">Workout interrupted</div>
      <div class="error-code" aria-label="404">
        <span>4</span><span>0</span><span>4</span>
      </div>
      <div class="barbell-loader" aria-hidden="true">
        <span class="plate left-1"></span>
        <span class="plate left-2"></span>
        <span class="plate right-1"></span>
        <span class="plate right-2"></span>
      </div>
      <h1>Page Not Found</h1>
      <p>This route missed its set. Head back to the gym floor, explore programs, or search for the page you wanted.</p>

      <div class="error-actions">
        <a href="index.html" class="btn btn-primary">Go Home</a>
      </div>
    </div>
  </section>

  <script src="js/script.js"></script>
</body>
</html>
